<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题本生成系统</title>
    <!-- MathJax 配置和加载 -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 错题本生成系统</h1>
            <p>智能识别、分割和导出试卷题目</p>
        </header>

        <div class="main-content">
            <!-- 系统状态 -->
            <div class="system-status" id="systemStatus">
                <strong>系统状态：</strong>
                <span class="status-item status-ok" id="statusLoading">检查中...</span>
            </div>

            <!-- 步骤指示器 -->
            <div class="step-indicator">
                <div class="step active" id="step1">
                    <div class="step-circle">1</div>
                    <div class="step-label">上传文件</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-circle">2</div>
                    <div class="step-label">OCR解析</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-circle">3</div>
                    <div class="step-label">分割题目</div>
                </div>
                <div class="step" id="step4">
                    <div class="step-circle">4</div>
                    <div class="step-label">预览导出</div>
                </div>
            </div>

            <!-- 上传区域 -->
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div class="upload-text">点击或拖拽文件到这里</div>
                <div class="upload-hint">支持 PDF、PNG、JPG 等格式，可同时选择多个文件（单文件最大 50MB）</div>
                <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.bmp,.tiff,.webp" multiple>
            </div>

            <!-- 上传进度条 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>

            <!-- 文件信息 -->
            <div class="file-info" id="fileInfo">
                <div class="file-info-item">
                    <span class="file-info-label">文件名：</span>
                    <span class="file-info-value" id="fileName"></span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">图片数量：</span>
                    <span class="file-info-value" id="imageCount"></span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">OCR结果：</span>
                    <span class="file-info-value" id="ocrCount"></span>
                </div>
            </div>

            <!-- 结果区域 -->
            <div class="result-area" id="resultArea"></div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="btn btn-primary" id="splitBtn" disabled>
                    🤖 开始分割题目
                </button>
                <button class="btn btn-success" id="exportBtn" disabled>
                    📥 导出错题本
                </button>
                <button class="btn btn-secondary" id="resetBtn">
                    🔄 重新开始
                </button>
            </div>

            <!-- 题目预览 -->
            <div class="questions-preview" id="questionsPreview"></div>
        </div>
    </div>

    <!-- 图片预览模态框 -->
    <div class="img-modal" id="imgModal">
        <img id="imgModalContent" src="" alt="预览">
    </div>

    <script>
        let currentQuestions = [];
        let selectedQuestions = new Set();

        // 检查系统状态
        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                if (data.success) {
                    const status = data.status;
                    let statusHTML = '';

                    if (status.paddleocr_configured) {
                        statusHTML += '<span class="status-item status-ok">✓ PaddleOCR</span>';
                    } else {
                        statusHTML += '<span class="status-item status-error">✗ PaddleOCR未配置</span>';
                    }

                    if (status.deepseek_configured) {
                        statusHTML += '<span class="status-item status-ok">✓ DeepSeek</span>';
                    } else {
                        statusHTML += '<span class="status-item status-error">✗ DeepSeek未配置</span>';
                    }

                    if (status.langsmith_enabled) {
                        statusHTML += '<span class="status-item status-ok">✓ LangSmith追踪</span>';
                    }

                    document.getElementById('systemStatus').innerHTML = '<strong>系统状态：</strong>' + statusHTML;
                }
            } catch (error) {
                console.error('检查系统状态失败:', error);
            }
        }

        // 上传区域事件
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            uploadArea.classList.remove('dragover');
            // 将 FileList 转为 Array，避免部分浏览器在事件结束后清空 DataTransfer
            const files = Array.from(e.dataTransfer.files);
            if (files.length > 0) handleFileUpload(files);
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) handleFileUpload(files);
        });

        // 处理文件上传（支持多文件，带进度条）
        function handleFileUpload(files) {
            const formData = new FormData();
            const fileNames = [];
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
                fileNames.push(files[i].name);
            }

            // 显示进度条和加载状态
            const fileLabel = files.length > 1 ? `${files.length} 个文件` : fileNames[0];
            const progressContainer = document.getElementById('progressContainer');
            const progressBarFill = document.getElementById('progressBarFill');
            const progressText = document.getElementById('progressText');
            progressContainer.style.display = 'block';
            progressBarFill.style.width = '0%';
            progressText.textContent = '0%';
            showLoading(`正在上传和处理 ${fileLabel}...`);
            setStep(2);

            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    progressBarFill.style.width = percent + '%';
                    progressText.textContent = percent + '%';
                }
            });

            xhr.addEventListener('load', () => {
                progressContainer.style.display = 'none';
                try {
                    const data = JSON.parse(xhr.responseText);
                    if (data.success) {
                        showSuccess(`文件处理成功！共 ${data.result.file_count} 个文件，识别到 ${data.result.image_count} 张图片`);
                        document.getElementById('fileName').textContent = fileNames.join('、');
                        document.getElementById('imageCount').textContent = data.result.image_count;
                        document.getElementById('ocrCount').textContent = data.result.ocr_count;
                        document.getElementById('fileInfo').style.display = 'block';
                        document.getElementById('splitBtn').disabled = false;
                        setStep(3);
                    } else {
                        showError(data.error || '文件处理失败');
                    }
                } catch (e) {
                    showError('上传失败: 服务器响应异常');
                }
            });

            xhr.addEventListener('error', () => {
                progressContainer.style.display = 'none';
                showError('上传失败: 网络错误');
            });

            xhr.open('POST', '/api/upload');
            xhr.send(formData);
        }

        // 分割题目
        document.getElementById('splitBtn').addEventListener('click', async () => {
            showLoading('正在调用AI分割题目，请稍候...');
            setStep(3);

            try {
                const response = await fetch('/api/split', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    currentQuestions = data.questions;
                    showSuccess(`成功分割 ${data.questions.length} 道题目`);
                    displayQuestions(data.questions);

                    // 启用导出按钮
                    document.getElementById('exportBtn').disabled = false;
                    setStep(4);
                } else {
                    showError(data.error || '题目分割失败');
                }
            } catch (error) {
                showError('分割失败: ' + error.message);
            }
        });

        // 导出错题本
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (selectedQuestions.size === 0) {
                alert('请至少选择一道题目！');
                return;
            }

            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        selected_ids: Array.from(selectedQuestions)
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess(`错题本导出成功！已保存到: ${data.output_path}`);

                    // 提供下载链接
                    const downloadLink = document.createElement('a');
                    downloadLink.href = '/download/wrongbook.md';
                    downloadLink.download = 'wrongbook.md';
                    downloadLink.textContent = '点击下载';

                    const resultArea = document.getElementById('resultArea');
                    resultArea.innerHTML += `<p style="margin-top: 10px;"><strong>下载：</strong> ${downloadLink.outerHTML}</p>`;
                } else {
                    showError(data.error || '导出失败');
                }
            } catch (error) {
                showError('导出失败: ' + error.message);
            }
        });

        // 重新开始
        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload();
        });

        // 显示题目列表
        function displayQuestions(questions) {
            const preview = document.getElementById('questionsPreview');
            preview.innerHTML = `
                <h3 style="margin-bottom: 20px;">题目预览（点击选择需要导出的题目）</h3>
                <div class="select-actions">
                    <button onclick="selectAll()">全选</button>
                    <button onclick="deselectAll()">取消全选</button>
                    <span id="selectedCount">已选择 0 道题目</span>
                </div>
            `;

            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.setAttribute('data-id', q.question_id);
                card.innerHTML = `
                    <div class="question-header">
                        <span class="question-id">题目 ${q.question_id}</span>
                        <span class="question-type">${q.question_type}</span>
                        <input type="checkbox" class="question-select" data-id="${q.question_id}">
                    </div>
                    <div class="question-content">
                        ${formatQuestionContent(q)}
                    </div>
                `;

                const checkbox = card.querySelector('.question-select');

                // 点击卡片切换选中状态
                card.addEventListener('click', (e) => {
                    // 避免点击 checkbox 时触发两次
                    if (e.target.type === 'checkbox') return;
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                });

                // checkbox 变化时更新状态和样式
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedQuestions.add(q.question_id);
                        card.classList.add('selected');
                    } else {
                        selectedQuestions.delete(q.question_id);
                        card.classList.remove('selected');
                    }
                    updateSelectedCount();
                });

                preview.appendChild(card);
            });

            // 触发 MathJax 重新渲染公式
            if (window.MathJax) {
                MathJax.typesetPromise([preview]).catch(err => console.log('MathJax error:', err));
            }
        }

        // 全选
        function selectAll() {
            document.querySelectorAll('.question-card').forEach(card => {
                const checkbox = card.querySelector('.question-select');
                if (!checkbox.checked) {
                    checkbox.checked = true;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
        }

        // 取消全选
        function deselectAll() {
            document.querySelectorAll('.question-card').forEach(card => {
                const checkbox = card.querySelector('.question-select');
                if (checkbox.checked) {
                    checkbox.checked = false;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
        }

        // 更新已选数量
        function updateSelectedCount() {
            const countEl = document.getElementById('selectedCount');
            if (countEl) {
                countEl.textContent = `已选择 ${selectedQuestions.size} 道题目`;
            }
        }

        // 格式化题目内容
        // 只处理 text 和 image 两种 block 类型，公式以 LaTeX 标记嵌入 text 中由 MathJax 渲染
        function formatQuestionContent(question) {
            let html = '';

            if (question.content_blocks && question.content_blocks.length > 0) {
                question.content_blocks.forEach(block => {
                    if (block.block_type === 'text') {
                        html += `<p>${block.content}</p>`;
                    } else if (block.block_type === 'image') {
                        const imgPath = block.content || '';
                        if (imgPath) {
                            html += `<img src="${imgPath}" style="max-width: 100%; margin: 10px 0; cursor: zoom-in;" onclick="showImagePreview(this.src)">`;
                        } else {
                            html += `<p style="color: #ff9800;">📷 图片资源</p>`;
                        }
                    }
                });
            }

            // 显示选项（选项中可能包含公式）
            if (question.options && question.options.length > 0) {
                html += '<div class="options-list">';
                question.options.forEach(option => {
                    html += `<div class="option-item">${option}</div>`;
                });
                html += '</div>';
            }

            return html || '<p style="color: #999;">（内容为空）</p>';
        }

        // 工具函数
        function showLoading(message) {
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>${message}</p>
                </div>
            `;
        }

        function showSuccess(message) {
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <div class="status-box success">
                    ✓ ${message}
                </div>
            `;
        }

        function showError(message) {
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <div class="status-box error">
                    ✗ ${message}
                </div>
            `;
        }

        function setStep(stepNumber) {
            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById(`step${i}`);
                if (i < stepNumber) {
                    step.className = 'step completed';
                } else if (i === stepNumber) {
                    step.className = 'step active';
                } else {
                    step.className = 'step';
                }
            }
        }

        // 图片预览
        function showImagePreview(src) {
            const modal = document.getElementById('imgModal');
            document.getElementById('imgModalContent').src = src;
            modal.classList.add('active');
        }

        document.getElementById('imgModal').addEventListener('click', () => {
            document.getElementById('imgModal').classList.remove('active');
        });

        // 键盘快捷键：Ctrl+A 全选题目，ESC 关闭预览
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('imgModal').classList.remove('active');
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'a' && currentQuestions.length > 0) {
                e.preventDefault();
                selectAll();
            }
        });

        // 页面加载时检查系统状态
        window.addEventListener('load', checkSystemStatus);
    </script>
</body>
</html>
