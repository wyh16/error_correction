<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题本生成系统</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        };
    </script>

    <!-- MathJax 配置和加载 -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" referrerpolicy="no-referrer">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <style>
        :root {
            view-transition-name: root;
        }

        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
        }

        ::view-transition-old(root) {
            z-index: 1;
        }

        ::view-transition-new(root) {
            z-index: 2;
        }

        @property --p {
            syntax: '<number>';
            inherits: true;
            initial-value: 0;
        }

        .file-chip {
            position: relative;
            border-radius: 0.75rem;
            --p: 0;
            --ring: rgb(37 99 235);
            transition: --p 240ms linear;
        }

        .file-chip::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            padding: 2px;
            background: conic-gradient(from -90deg, var(--ring) calc(var(--p) * 1%), rgba(148, 163, 184, 0) 0);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            pointer-events: none;
            transition: opacity 120ms ease;
        }

        .file-chip.file-chip--progress::before {
            opacity: 1;
        }

        mjx-container[jax="SVG"] {
            display: inline-block;
        }

        mjx-container[jax="SVG"][display="true"] {
            display: block;
            margin: 0.75rem 0;
        }

        mjx-container[jax="SVG"] > svg {
            display: inline;
        }
    </style>
</head>

                            <svg class="step-icon w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">

                            <svg class="step-icon w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">

            <div id="pendingFilesBox" class="mb-6 hidden">

            <!-- 上传区域 -->

                <button id="resetBtn" type="button" class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition-colors duration-200 hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-200 active:scale-[0.98] motion-reduce:active:scale-100 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:focus:ring-slate-800">

    <!-- 图片预览模态框 -->
    <div class="img-modal fixed inset-0 z-50 hidden items-center justify-center bg-black/80 p-4" id="imgModal">

    <div id="toastRegion" class="pointer-events-none fixed left-1/2 top-4 z-50 flex w-[min(420px,calc(100vw-2rem))] -translate-x-1/2 flex-col gap-2"></div>

    <script>
        let currentQuestions = [];
        let selectedQuestions = new Set();
        let splitBtnDefaultHTML = null;

        function initThemeToggle() {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggleBtn');
            const icon = document.getElementById('themeToggleIcon');
            const label = document.getElementById('themeToggleLabel');

            const apply = (theme) => {
                if (theme === 'dark') {
                    root.classList.add('dark');
                    if (icon) icon.className = 'fa-solid fa-sun';
                    if (label) label.textContent = '浅色';
                } else {
                    root.classList.remove('dark');
                    if (icon) icon.className = 'fa-solid fa-moon';
                    if (label) label.textContent = '深色';
                }
            };

            const saved = localStorage.getItem('theme');
            const initial = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            apply(initial);

            if (!btn) return;
            btn.addEventListener('click', async () => {
                const next = root.classList.contains('dark') ? 'light' : 'dark';
                localStorage.setItem('theme', next);

                const prefersReduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const canTransition = !prefersReduce && typeof document.startViewTransition === 'function';

                if (!canTransition) {
                    apply(next);
                    return;
                }

                const rect = btn.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;
                const endRadius = Math.hypot(
                    Math.max(x, window.innerWidth - x),
                    Math.max(y, window.innerHeight - y)
                );

                const transition = document.startViewTransition(() => {
                    apply(next);
                });

                try {
                    await transition.ready;

                    const duration = 1000;
                    const grow = [`circle(0px at ${x}px ${y}px)`, `circle(${endRadius}px at ${x}px ${y}px)`];

                    document.documentElement.animate(
                        { clipPath: grow },
                        { duration, easing: 'cubic-bezier(0.2, 0, 0, 1)', pseudoElement: '::view-transition-new(root)' }
                    );

                    document.documentElement.animate(
                        { opacity: [1, 0.98] },
                        { duration, easing: 'linear', pseudoElement: '::view-transition-old(root)' }
                    );

                    await transition.finished;
                } catch (e) {
                    apply(next);
                }
            });
        }

        // 检查系统状态
        async function checkSystemStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                if (data.success) {
                    const status = data.status;
                    let statusHTML = '';

                    const pillBase = 'inline-flex items-center gap-2 rounded-full px-3 py-1 text-xs font-semibold';
                    const okPill = `${pillBase} bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-200`;
                    const errPill = `${pillBase} bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-200`;

                    if (status.paddleocr_configured) {
                        statusHTML += `<span class="${okPill}"><i class="fa-solid fa-circle-check"></i>PaddleOCR</span>`;
                    } else {
                        statusHTML += `<span class="${errPill}"><i class="fa-solid fa-circle-xmark"></i>PaddleOCR未配置</span>`;
                    }

                    if (status.deepseek_configured) {
                        statusHTML += `<span class="${okPill}"><i class="fa-solid fa-circle-check"></i>DeepSeek</span>`;
                    } else {
                        statusHTML += `<span class="${errPill}"><i class="fa-solid fa-circle-xmark"></i>DeepSeek未配置</span>`;
                    }

                    if (status.langsmith_enabled) {
                        statusHTML += `<span class="${okPill}"><i class="fa-solid fa-circle-check"></i>LangSmith追踪</span>`;
                    }

                    document.getElementById('systemStatus').innerHTML = `<span class="font-semibold text-slate-900 dark:text-slate-100">系统状态</span>${statusHTML}`;
                }
            } catch (error) {
                console.error('检查系统状态失败:', error);
            }
        }

        // 上传区域事件
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadPanelIdle = document.getElementById('uploadPanelIdle');
        const pendingFilesBox = document.getElementById('pendingFilesBox');
        const pendingFilesList = document.getElementById('pendingFilesList');

        let pendingFiles = [];
        let pendingFileKeys = new Set();
        let fileProgress = new Map();
        let fileElsByKey = new Map();

        let fakeProgressTimer = null;
        let fakeProgressKeys = [];

        let activeUploadXhr = null;
        let cancellingSession = false;
        let uploadQueue = [];
        let waitingFileKeys = new Set();
        let splittingInProgress = false;
        let splitCompleted = false;

        const removeHoverClasses = ['hover:bg-slate-100', 'hover:text-slate-700', 'dark:hover:bg-slate-800', 'dark:hover:text-slate-100'];
        function setRemoveButtonsDisabled(disabled) {
            if (!pendingFilesList) return;
            const btns = pendingFilesList.querySelectorAll('button[data-remove-btn="1"]');
            for (const btn of btns) {
                btn.disabled = !!disabled;
                if (disabled) {
                    btn.classList.add('opacity-40', 'cursor-not-allowed', 'pointer-events-none');
                    btn.classList.remove(...removeHoverClasses);
                } else {
                    btn.classList.remove('opacity-40', 'cursor-not-allowed', 'pointer-events-none');
                    btn.classList.add(...removeHoverClasses);
                }
            }
        }

        function enqueueUpload(files) {
            const list = Array.from(files || []);
            if (list.length === 0) return;
            if (isUploadBusy()) {
                for (const f of list) {
                    const k = fileKey(f);
                    waitingFileKeys.add(k);
                    applyProgressToFileEl(fileElsByKey.get(k), fileProgress.get(k) || 0);
                }
                uploadQueue.push(list);
                return;
            }
            handleFileUpload(list);
        }

        function pumpUploadQueue() {
            if (isUploadBusy()) return;
            if (!uploadQueue.length) return;
            const next = uploadQueue.shift();
            if (next && next.length) handleFileUpload(next);
        }

        function applyProgressToFileEl(el, progress) {
            if (!el) return;
            const p = Math.max(0, Math.min(100, Number(progress) || 0));
            el.style.setProperty('--p', String(p));
            el.classList.toggle('file-chip--progress', isUploadBusy() || uploadArea.dataset.ready === '1');
            const label = el.querySelector('[data-progress-label]');
            if (label) {
                const k = el.dataset.fileKey;
                label.textContent = (k && waitingFileKeys.has(k) && isUploadBusy() && p === 0) ? '等待中...' : `${Math.round(p)}%`;
            }
        }

        function setFileProgress(key, progress) {
            fileProgress.set(key, Math.max(0, Math.min(100, Number(progress) || 0)));
            applyProgressToFileEl(fileElsByKey.get(key), fileProgress.get(key));
        }

        function stopFakeProgress() {
            if (fakeProgressTimer) {
                window.clearInterval(fakeProgressTimer);
                fakeProgressTimer = null;
            }
            fakeProgressKeys = [];
        }

        function startFakeProgress(keys) {
            stopFakeProgress();
            fakeProgressKeys = Array.from(keys || []);

            const tick = () => {
                if (!isUploadBusy()) {
                    stopFakeProgress();
                    return;
                }

                for (const key of fakeProgressKeys) {
                    const current = Number(fileProgress.get(key) || 0);
                    const cap = 82;
                    if (current >= cap) continue;

                    let inc = 0;
                    if (current < 55) inc = 1 + Math.random() * 3;
                    else if (current < 75) inc = 0.4 + Math.random() * 1.1;
                    else inc = 0.08 + Math.random() * 0.25;

                    setFileProgress(key, Math.min(cap, current + inc));
                }
            };

            tick();
            fakeProgressTimer = window.setInterval(tick, 360);
        }

        function resetFileProgressFor(files) {
            for (const f of files) {
                fileProgress.set(fileKey(f), 0);
            }
        }

        function fileKey(file) {
            return `${file.name}|${file.size}|${file.lastModified}`;
        }

        function updateSplitAvailability() {
            const splitBtn = document.getElementById('splitBtn');
            if (!splitBtn || splitBtn.dataset.busy === '1') return;

            const ready = uploadArea.dataset.ready === '1';
            splitBtn.disabled = isUploadBusy() || !ready;
        }

        function renderPendingFiles() {
            const hasPending = pendingFiles.length > 0;

            if (pendingFilesBox) pendingFilesBox.classList.toggle('hidden', !hasPending);
            if (!pendingFilesList) {
                updateSplitAvailability();
                return;
            }

            pendingFilesList.innerHTML = '';
            fileElsByKey = new Map();

            for (const f of pendingFiles) {
                const key = fileKey(f);
                const ext = (f.name || '').split('.').pop()?.toLowerCase();

                const item = document.createElement('div');
                item.className = 'file-chip inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100';
                item.dataset.fileKey = key;
                fileElsByKey.set(key, item);

                const icon = document.createElement('i');
                if (ext === 'pdf') {
                    icon.className = 'fa-regular fa-file-pdf text-rose-600 dark:text-rose-300';
                } else if (['png', 'jpg', 'jpeg', 'bmp', 'tiff', 'webp'].includes(ext)) {
                    icon.className = 'fa-regular fa-file-image text-slate-600 dark:text-slate-300';
                } else {
                    icon.className = 'fa-regular fa-file-lines text-slate-600 dark:text-slate-300';
                }

                const name = document.createElement('span');
                name.className = 'max-w-[260px] truncate';
                name.title = f.name;
                name.textContent = f.name;

                const progressLabel = document.createElement('span');
                progressLabel.className = 'ml-1 text-xs font-semibold tabular-nums text-slate-500 dark:text-slate-300';
                progressLabel.setAttribute('data-progress-label', '1');

                const remove = document.createElement('button');
                remove.type = 'button';
                remove.className = 'ml-1 inline-flex h-6 w-6 flex-none items-center justify-center rounded-md text-slate-500 transition focus:outline-none focus:ring-4 focus:ring-slate-200 dark:text-slate-300 dark:focus:ring-slate-800';
                remove.setAttribute('aria-label', `移除 ${f.name}`);
                remove.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                remove.setAttribute('data-remove-btn', '1');

                remove.classList.add(...removeHoverClasses);
                remove.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (splittingInProgress || splitCompleted) return;

                    const locked = isUploadBusy() || uploadArea.dataset.ready === '1';
                    if (locked) {
                        await cancelFile(key);
                        return;
                    }

                    pendingFiles = pendingFiles.filter(x => fileKey(x) !== key);
                    pendingFileKeys.delete(key);
                    fileProgress.delete(key);
                    waitingFileKeys.delete(key);
                    if (uploadQueue && uploadQueue.length) {
                        uploadQueue = uploadQueue
                            .map(batch => (batch || []).filter(f => fileKey(f) !== key))
                            .filter(batch => batch.length > 0);
                    }
                    renderPendingFiles();
                });

                item.appendChild(icon);
                item.appendChild(name);
                item.appendChild(progressLabel);
                item.appendChild(remove);
                pendingFilesList.appendChild(item);

                const p = fileProgress.has(key) ? fileProgress.get(key) : (uploadArea.dataset.ready === '1' ? 100 : 0);
                applyProgressToFileEl(item, p);
            }

            setRemoveButtonsDisabled(splittingInProgress || splitCompleted);
            updateSplitAvailability();
        }

        function resetForNewUpload() {
            uploadArea.dataset.ready = '0';
            splitCompleted = false;

            const splitBtn = document.getElementById('splitBtn');
            const exportBtn = document.getElementById('exportBtn');
            if (splitBtn) splitBtn.disabled = true;
            if (exportBtn) exportBtn.disabled = true;
            currentQuestions = [];
            selectedQuestions = new Set();
            const preview = document.getElementById('questionsPreview');
            if (preview) preview.innerHTML = '';
            clearResultArea();
            setStep(1);
        }

        function addPendingFiles(files) {
            const newlyAdded = [];

            for (const f of files) {
                const key = fileKey(f);
                if (pendingFileKeys.has(key)) continue;
                pendingFileKeys.add(key);
                pendingFiles.push(f);
                newlyAdded.push(f);
                if (!fileProgress.has(key)) fileProgress.set(key, 0);
            }

            fileInput.value = '';

            if (newlyAdded.length === 0) {
                renderPendingFiles();
                return;
            }

            const wasBusy = isUploadBusy();
            if (!wasBusy) setUploadPanel('idle');
            resetForNewUpload();
            if (wasBusy) setStep(2);
            renderPendingFiles();

            enqueueUpload(newlyAdded);
        }

        renderPendingFiles();

        function isUploadBusy() {
            return uploadArea.dataset.busy === '1';
        }

        function setUploadPanel(state) {
            uploadArea.classList.remove('cursor-wait');
        }

        async function cancelFile(key) {
            if (!key) return;
            if (cancellingSession) return;
            cancellingSession = true;

            try {
                if (fakeProgressKeys && fakeProgressKeys.length) {
                    fakeProgressKeys = fakeProgressKeys.filter(k => k !== key);
                    if (fakeProgressKeys.length === 0) stopFakeProgress();
                }

                const resp = await fetch('/api/cancel_file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_key: key })
                });
                const data = await resp.json().catch(() => null);

                if (data && data.success) {
                    pendingFiles = pendingFiles.filter(x => fileKey(x) !== key);
                    pendingFileKeys.delete(key);
                    fileProgress.delete(key);
                    renderPendingFiles();

                    const exportBtn = document.getElementById('exportBtn');
                    if (exportBtn) exportBtn.disabled = true;
                    currentQuestions = [];
                    selectedQuestions = new Set();
                    const preview = document.getElementById('questionsPreview');
                    if (preview) preview.innerHTML = '';
                    clearResultArea();

                    if (pendingFiles.length === 0) {
                        uploadArea.dataset.ready = '0';
                        resetForNewUpload();
                        setUploadPanel('idle');
                        showSuccess(data.message || '已撤销');

                        if (isUploadBusy() && activeUploadXhr) {
                            try {
                                activeUploadXhr.abort();
                            } catch (_) {
                            }
                        }

                        return;
                    }

                    setStep(3);
                    if (typeof splitBtnDefaultHTML === 'string') {
                        const splitBtn = document.getElementById('splitBtn');
                        if (splitBtn) {
                            splitBtn.dataset.busy = '0';
                            splitBtn.innerHTML = splitBtnDefaultHTML;
                        }
                    }
                    updateSplitAvailability();

                    showSuccess(data.message || '已撤销');
                } else if (data && data.error) {
                    showError(data.error);
                } else {
                    showError('撤销失败');
                }
            } catch (e) {
                showError('撤销失败: 网络错误');
            } finally {
                cancellingSession = false;
            }
        }

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });


        function setUploadHover(active) {
            const on = ['ring-2', 'ring-slate-400', 'border-slate-400', 'bg-slate-100', 'dark:bg-slate-950/60'];
            const off = ['ring-2', 'ring-slate-400', 'border-slate-400', 'bg-slate-100', 'dark:bg-slate-950/60'];
            uploadArea.classList.remove(...off);
            if (active) uploadArea.classList.add(...on);
        }

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            setUploadHover(true);
        });

        uploadArea.addEventListener('dragleave', () => {
            setUploadHover(false);
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            setUploadHover(false);
            const files = Array.from(e.dataTransfer.files);
            if (files.length > 0) addPendingFiles(files);
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) addPendingFiles(files);
            fileInput.value = '';
        });

        // 处理文件上传（支持多文件）
        function handleFileUpload(files) {
            if (isUploadBusy()) return Promise.resolve(false);

            for (const f of Array.from(files || [])) {
                waitingFileKeys.delete(fileKey(f));
            }

            uploadArea.dataset.busy = '1';
            uploadArea.dataset.ready = '0';
            resetFileProgressFor(files);
            renderPendingFiles();

            const formData = new FormData();
            const fileNames = [];
            const fileSizes = [];
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
                formData.append('file_key', fileKey(files[i]));
                fileNames.push(files[i].name);
                fileSizes.push(files[i].size || 0);
            }

            const totalBytes = fileSizes.reduce((a, b) => a + b, 0);
            const fileOffsets = [];
            let acc = 0;
            for (const s of fileSizes) {
                fileOffsets.push(acc);
                acc += s;
            }

            fileInput.value = '';

            const fileLabel = files.length > 1 ? `${files.length} 个文件` : fileNames[0];

            setUploadPanel('busy');
            setStep(2);

            const xhr = new XMLHttpRequest();
            activeUploadXhr = xhr;
            xhr.addEventListener('loadend', () => {
                if (activeUploadXhr === xhr) activeUploadXhr = null;
            });

            const uploadKeys = files.map(fileKey);
            startFakeProgress(uploadKeys);

            return new Promise((resolve) => {
                const fail = (msg) => {
                    stopFakeProgress();
                    uploadArea.dataset.busy = '0';
                    uploadArea.dataset.ready = '0';
                    renderPendingFiles();
                    setUploadPanel('idle');
                    if (msg) showError(msg);
                    window.setTimeout(pumpUploadQueue, 0);
                    resolve(false);
                };

                xhr.addEventListener('load', () => {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.success) {
                            stopFakeProgress();

                            uploadArea.dataset.busy = '0';
                            uploadArea.dataset.ready = pendingFiles.length > 0 ? '1' : '0';

                            if (pendingFiles.length === 0) {
                                renderPendingFiles();
                                setUploadPanel('idle');
                                setStep(1);
                                updateSplitAvailability();
                                showSuccess('文件处理完成（已全部撤销）');
                                window.setTimeout(pumpUploadQueue, 0);
                                resolve(true);
                                return;
                            }

                            setUploadPanel('idle');

                            for (const key of uploadKeys) {
                                if (pendingFileKeys.has(key)) setFileProgress(key, 100);
                            }

                            showSuccess(`文件处理成功！本次新增 ${data.result.file_count} 个文件，总共有 ${data.result.image_count} 张图片`);

                            const splitBtn = document.getElementById('splitBtn');
                            if (splitBtn && splitBtn.dataset.busy !== '1') splitBtn.disabled = false;
                            setStep(3);
                            window.setTimeout(pumpUploadQueue, 0);
                            resolve(true);
                        } else {
                            fail(data.error || '文件处理失败');
                        }
                    } catch (e) {
                        fail('上传失败: 服务器响应异常');
                    }
                });

                xhr.addEventListener('error', () => {
                    fail('上传失败: 网络错误');
                });

                xhr.addEventListener('abort', () => {
                    stopFakeProgress();
                    uploadArea.dataset.busy = '0';
                    uploadArea.dataset.ready = '0';
                    renderPendingFiles();
                    setUploadPanel('idle');
                    window.setTimeout(pumpUploadQueue, 0);
                    resolve(false);
                });

                xhr.open('POST', '/api/upload');
                xhr.send(formData);
            });
        }

        // 分割题目
        const splitBtn = document.getElementById('splitBtn');
        splitBtnDefaultHTML = splitBtn ? splitBtn.innerHTML : null;
        splitBtn.addEventListener('click', async () => {
            if (splitBtn.dataset.busy === '1') return;

            if (uploadArea.dataset.ready !== '1') {
                showError('请先上传文件');
                return;
            }

            uploadArea.classList.add('hidden');

            splittingInProgress = true;
            setRemoveButtonsDisabled(true);

            splitBtn.dataset.busy = '1';
            const originalHTML = splitBtn.innerHTML;
            splitBtn.disabled = true;
            splitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 正在分割...';

            showLoading('正在调用AI分割题目，请稍候...');
            setStep(3);

            try {
                const response = await fetch('/api/split', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    currentQuestions = data.questions;
                    showSuccess(`成功分割 ${data.questions.length} 道题目`);
                    displayQuestions(data.questions);

                    document.getElementById('exportBtn').disabled = false;
                    splitCompleted = true;
                    setRemoveButtonsDisabled(true);
                    splitBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> 已完成分割';
                    setStep(4);
                } else {
                    uploadArea.classList.remove('hidden');
                    splitBtn.dataset.busy = '0';
                    splitBtn.disabled = false;
                    splitBtn.innerHTML = originalHTML;
                    updateSplitAvailability();
                    showError(data.error || '题目分割失败');
                }
            } catch (error) {
                uploadArea.classList.remove('hidden');
                splitBtn.dataset.busy = '0';
                splitBtn.disabled = false;
                splitBtn.innerHTML = originalHTML;
                updateSplitAvailability();
                showError('分割失败: ' + error.message);
            } finally {
                splittingInProgress = false;
                setRemoveButtonsDisabled(splittingInProgress || splitCompleted);
            }
        });

        // 导出错题本
        document.getElementById('exportBtn').addEventListener('click', async () => {
            if (selectedQuestions.size === 0) {
                showError('请至少选择一道题目！');
                return;
            }

            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        selected_ids: Array.from(selectedQuestions)
                    })
                });

                const data = await response.json();

                if (data.success) {
                    setStep(5);
                    showSuccess(`错题本导出成功！已保存到: ${data.output_path}`);

                    let filename = 'wrongbook.md';
                    if (data.output_path) {
                        const parts = String(data.output_path).split(/[/\\]/);
                        const last = parts[parts.length - 1];
                        if (last) filename = last;
                    }

                    const downloadUrl = `/download/${encodeURIComponent(filename)}?t=${Date.now()}`;

                    const auto = document.createElement('a');
                    auto.href = downloadUrl;
                    auto.download = filename;
                    auto.style.display = 'none';
                    document.body.appendChild(auto);
                    auto.click();
                    auto.remove();

                } else {
                    showError(data.error || '导出失败');
                }
            } catch (error) {
                showError('导出失败: ' + error.message);
            }
        });

        // 重新开始
        document.getElementById('resetBtn').addEventListener('click', () => {
            location.reload();
        });

        // 显示题目列表
        function displayQuestions(questions) {
            const preview = document.getElementById('questionsPreview');
            preview.innerHTML = `
                <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900 sm:p-6">
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
                        <div>
                            <h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">题目预览</h3>
                            <p class="mt-1 text-sm text-slate-500 dark:text-slate-300">点击卡片选择需要导出的题目</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-2">
                            <button type="button" class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition-colors duration-200 hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-200 active:scale-[0.98] motion-reduce:active:scale-100 dark:border-slate-800 dark:bg-slate-950/40 dark:text-slate-200 dark:hover:bg-slate-800 dark:focus:ring-slate-800" onclick="selectAll()">
                                <i class="fa-solid fa-check-double"></i>
                                全选
                            </button>
                            <button type="button" class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition-colors duration-200 hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-200 active:scale-[0.98] motion-reduce:active:scale-100 dark:border-slate-800 dark:bg-slate-950/40 dark:text-slate-200 dark:hover:bg-slate-800 dark:focus:ring-slate-800" onclick="deselectAll()">
                                <i class="fa-solid fa-xmark"></i>
                                取消全选
                            </button>
                            <span id="selectedCount" class="ml-2 text-sm text-slate-600 dark:text-slate-300">已选择 0 道题目</span>
                        </div>
                    </div>
                    <div id="questionList" class="mt-4 grid grid-cols-1 gap-3"></div>
                </div>
            `;

            const list = document.getElementById('questionList');

            const selectedCardClasses = ['ring-2', 'ring-slate-400', 'bg-slate-50', 'dark:bg-slate-950/50'];

            questions.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card relative rounded-xl border border-slate-200 bg-white p-4 shadow-sm transition hover:shadow-md dark:border-slate-800 dark:bg-slate-950/30';
                card.setAttribute('data-id', q.question_id);
                card.innerHTML = `
                    <div class="mb-3 flex items-center gap-3 border-b border-slate-100 pb-3 dark:border-slate-800">
                        <span class="text-base font-semibold text-slate-900 dark:text-slate-100">题目 ${q.question_id}</span>
                        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700 dark:bg-slate-800 dark:text-slate-200">${q.question_type}</span>
                        <label class="ml-auto inline-flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
                            <input type="checkbox" class="question-select h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100" data-id="${q.question_id}">
                            选择
                        </label>
                    </div>
                    <div class="question-content">
                        ${formatQuestionContent(q)}
                    </div>
                `;

                const checkbox = card.querySelector('.question-select');

                // 点击卡片切换选中状态
                card.addEventListener('click', (e) => {
                    if (e.target.type === 'checkbox') return;
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                });

                // checkbox 变化时更新状态和样式
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedQuestions.add(q.question_id);
                        card.classList.add(...selectedCardClasses);
                    } else {
                        selectedQuestions.delete(q.question_id);
                        card.classList.remove(...selectedCardClasses);
                    }
                    updateSelectedCount();
                });

                list.appendChild(card);
            });

            if (window.MathJax) {
                MathJax.typesetPromise([preview]).catch(err => console.log('MathJax error:', err));
            }
        }

        // 全选
        function selectAll() {
            document.querySelectorAll('.question-card').forEach(card => {
                const checkbox = card.querySelector('.question-select');
                if (!checkbox.checked) {
                    checkbox.checked = true;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
        }

        // 取消全选
        function deselectAll() {
            document.querySelectorAll('.question-card').forEach(card => {
                const checkbox = card.querySelector('.question-select');
                if (checkbox.checked) {
                    checkbox.checked = false;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
        }

        // 更新已选数量
        function updateSelectedCount() {
            const countEl = document.getElementById('selectedCount');
            if (countEl) {
                countEl.textContent = `已选择 ${selectedQuestions.size} 道题目`;
            }
        }

        // 格式化题目内容
        // 只处理 text 和 image 两种 block 类型，公式以 LaTeX 标记嵌入 text 中由 MathJax 渲染
        function formatQuestionContent(question) {
            let html = '';

            if (question.content_blocks && question.content_blocks.length > 0) {
                question.content_blocks.forEach(block => {
                    if (block.block_type === 'text') {
                        html += `<p class="my-2 leading-7 text-slate-800 dark:text-slate-100">${block.content}</p>`;
                    } else if (block.block_type === 'image') {
                        const imgPath = block.content || '';
                        if (imgPath) {
                            html += `<img src="${imgPath}" class="my-3 max-w-full cursor-zoom-in rounded-lg border border-slate-200 shadow-sm dark:border-slate-800" onclick="showImagePreview(this.src)">`;
                        } else {
                            html += `<p class="my-2 text-sm font-semibold text-amber-600 dark:text-amber-400"><i class="fa-regular fa-image mr-2"></i>图片资源</p>`;
                        }
                    }
                });
            }

            if (question.options && question.options.length > 0) {
                html += '<div class="mt-4 grid gap-2">';
                question.options.forEach(option => {
                    html += `<div class="rounded-lg bg-slate-50 px-3 py-2 text-sm text-slate-800 dark:bg-slate-900 dark:text-slate-100">${option}</div>`;
                });
                html += '</div>';
            }

            return html || '<p class="text-sm text-slate-500 dark:text-slate-300">（内容为空）</p>';
        }

        // 工具函数
        function clearResultArea() {
            const resultArea = document.getElementById('resultArea');
            if (!resultArea) return;
            resultArea.innerHTML = '';
            resultArea.style.display = 'none';
        }

        function showToast(type, message, opts = {}) {
            const region = document.getElementById('toastRegion');
            if (!region) return;

            const duration = typeof opts.duration === 'number'
                ? opts.duration
                : (type === 'error' ? 4500 : 2500);

            const theme = {
                success: {
                    icon: 'fa-circle-check',
                    wrap: 'border-emerald-200 bg-emerald-50 text-emerald-900 dark:border-emerald-900/40 dark:bg-emerald-900/20 dark:text-emerald-100',
                    iconColor: 'text-emerald-700 dark:text-emerald-200',
                    btn: 'text-emerald-900/60 hover:text-emerald-900 dark:text-emerald-100/60 dark:hover:text-emerald-100'
                },
                error: {
                    icon: 'fa-circle-xmark',
                    wrap: 'border-rose-200 bg-rose-50 text-rose-900 dark:border-rose-900/40 dark:bg-rose-900/20 dark:text-rose-100',
                    iconColor: 'text-rose-700 dark:text-rose-200',
                    btn: 'text-rose-900/60 hover:text-rose-900 dark:text-rose-100/60 dark:hover:text-rose-100'
                },
                info: {
                    icon: 'fa-circle-info',
                    wrap: 'border-slate-200 bg-white text-slate-900 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-100',
                    iconColor: 'text-slate-600 dark:text-slate-300',
                    btn: 'text-slate-900/60 hover:text-slate-900 dark:text-slate-100/60 dark:hover:text-slate-100'
                }
            };

            const t = theme[type] || theme.info;

            const toast = document.createElement('div');
            toast.className = `pointer-events-auto flex items-center gap-3 rounded-xl border px-4 py-3 text-sm font-medium leading-5 shadow-sm transition duration-200 ${t.wrap}`;
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(-6px)';

            const msg = document.createElement('div');
            msg.className = 'min-w-0 flex-1 break-words leading-5';
            msg.textContent = String(message || '');

            const icon = document.createElement('i');
            icon.className = `fa-solid ${t.icon} ${t.iconColor}`;

            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = `ml-2 inline-flex h-8 w-8 flex-none items-center justify-center rounded-lg transition ${t.btn}`;
            closeBtn.setAttribute('aria-label', '关闭通知');
            closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';

            toast.appendChild(icon);
            toast.appendChild(msg);
            toast.appendChild(closeBtn);
            region.prepend(toast);

            const dismiss = () => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-6px)';
                window.setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 220);
            };

            closeBtn.addEventListener('click', dismiss);

            window.requestAnimationFrame(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translateY(0)';
            });

            if (duration > 0) window.setTimeout(dismiss, duration);
        }

        function showLoading(message) {
            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-6 text-center shadow-sm dark:border-slate-800 dark:bg-slate-950/40">
                    <div class="mx-auto mb-3 h-8 w-8 animate-spin rounded-full border-2 border-slate-300 border-t-slate-900 dark:border-slate-700 dark:border-t-slate-100"></div>
                    <p class="text-sm font-medium text-slate-700 dark:text-slate-200">${message}</p>
                </div>
            `;
        }

        function showSuccess(message) {
            clearResultArea();
            showToast('success', message);
        }

        function showError(message) {
            clearResultArea();
            showToast('error', message);
        }

        function setStep(stepNumber) {
            const activeItem = ['text-blue-700', 'dark:text-blue-300'];
            const doneItem = ['text-emerald-700', 'dark:text-emerald-300'];
            const todoItem = ['text-slate-600', 'dark:text-slate-300'];

            const activeCircle = ['bg-blue-100', 'text-blue-700', 'dark:bg-blue-900/30', 'dark:text-blue-200'];
            const doneCircle = ['bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-900/30', 'dark:text-emerald-200'];
            const todoCircle = ['bg-slate-100', 'text-slate-500', 'dark:bg-slate-800', 'dark:text-slate-300'];

            for (let i = 1; i <= 4; i++) {
                const step = document.getElementById(`step${i}`);
                if (!step) continue;

                const circle = step.querySelector('.step-circle');
                const label = step.querySelector('.step-label');
                const icon = step.querySelector('.step-icon');
                const check = step.querySelector('.step-check');

                step.classList.remove(...activeItem, ...doneItem, ...todoItem);

                if (i < stepNumber) step.classList.add(...doneItem);
                else if (i === stepNumber) step.classList.add(...activeItem);
                else step.classList.add(...todoItem);

                if (circle) {
                    circle.classList.remove(...activeCircle, ...doneCircle, ...todoCircle);
                    if (i < stepNumber) circle.classList.add(...doneCircle);
                    else if (i === stepNumber) circle.classList.add(...activeCircle);
                    else circle.classList.add(...todoCircle);
                }

                if (label) label.classList.toggle('font-semibold', i === stepNumber);

                if (i < stepNumber) {
                    if (icon) icon.classList.add('hidden');
                    if (check) check.classList.remove('hidden');
                } else {
                    if (check) check.classList.add('hidden');
                    if (icon) icon.classList.remove('hidden');
                }
            }
        }

        // 图片预览
        function showImagePreview(src) {
            const modal = document.getElementById('imgModal');
            const img = document.getElementById('imgModalContent');
            img.src = src;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        document.getElementById('imgModal').addEventListener('click', () => {
            const modal = document.getElementById('imgModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        });

        // 键盘快捷键：Ctrl+A 全选题目，ESC 关闭预览
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modal = document.getElementById('imgModal');
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'a' && currentQuestions.length > 0) {
                e.preventDefault();
                selectAll();
            }
        });

        // 页面加载
        window.addEventListener('load', () => {
            initThemeToggle();
            checkSystemStatus();
        });
    </script>
</body>
</html>
